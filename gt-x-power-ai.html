<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT-X Power AI - Gemini Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: #ffffff;
            color: #202124;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e8eaed;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            padding: 8px 16px;
            cursor: pointer;
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5, #ec4899);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 500;
            color: #202124;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px 16px;
            background: #f0f4f8;
            border: 1px solid #dadce0;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            color: #202124;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background: #e8eaed;
        }

        .conversation-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .conversation-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #5f6368;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-item:hover {
            background: #e8eaed;
        }

        .conversation-item.active {
            background: #e8eaed;
            color: #202124;
        }

        .sidebar-footer {
            border-top: 1px solid #dadce0;
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #5f6368;
            transition: all 0.2s ease;
        }

        .footer-item:hover {
            background: #e8eaed;
        }

        /* Main content area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        /* Header */
        .header {
            padding: 16px 24px;
            border-bottom: 1px solid #e8eaed;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 16px;
            font-weight: 500;
            color: #202124;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f0f4f8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: #e8eaed;
        }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .gemini-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #ec4899);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.3);
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 300;
            color: #202124;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: #5f6368;
            margin-bottom: 32px;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        .suggestion-card {
            padding: 16px;
            background: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion-card:hover {
            background: #e8eaed;
            border-color: #4f46e5;
        }

        .suggestion-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .suggestion-text {
            font-size: 13px;
            color: #202124;
            font-weight: 500;
        }

        /* Messages */
        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: #e8eaed;
            color: #5f6368;
        }

        .message-avatar.ai {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }

        .message-content {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: #e8eaed;
            color: #202124;
        }

        .message.ai .message-content {
            background: #f1f3f4;
            color: #202124;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dadce0;
            animation: dot-bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dot-bounce {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 24px;
            border-top: 1px solid #e8eaed;
            background: #ffffff;
        }

        .input-wrapper {
            max-width: 100%;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #dadce0;
            border-radius: 24px;
            font-size: 14px;
            font-family: inherit;
            color: #202124;
            resize: none;
            max-height: 100px;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
        }

        .input-field::placeholder {
            color: #9aa0a6;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .send-btn:hover:not(:disabled) {
            background: #4338ca;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        .send-btn:disabled {
            background: #dadce0;
            cursor: not-allowed;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #dadce0;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9aa0a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">⚡</div>
                <div class="sidebar-title">GT-X</div>
            </div>
            
            <button class="new-chat-btn" id="newChatBtn">
                <span>➕</span> New chat
            </button>

            <div class="conversation-list" id="conversationList">
                <div class="conversation-item active">Today's conversation</div>
            </div>

            <div class="sidebar-footer">
                <div class="footer-item">🔗 Updates</div>
                <div class="footer-item">🎨 Appearance</div>
                <div class="footer-item">⚙️ Settings</div>
            </div>
        </div>

        <!-- Main content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <div class="header-title">GT-X Power AI</div>
                <div class="header-buttons">
                    <button class="icon-btn">🎨</button>
                    <button class="icon-btn">⋯</button>
                </div>
            </div>

            <!-- Chat container -->
            <div class="chat-container" id="chatContainer">
                <!-- Welcome state -->
                <div class="chat-empty" id="chatEmpty">
                    <div class="gemini-logo">✨</div>
                    <h1 class="welcome-title">Hello, I'm GT-X</h1>
                    <p class="welcome-subtitle">Your AI-powered assistant powered by advanced neural networks</p>
                    
                    <div class="suggestions">
                        <div class="suggestion-card" onclick="setSuggestion('Explain quantum computing')">
                            <div class="suggestion-icon">📚</div>
                            <div class="suggestion-text">Explain quantum computing</div>
                        </div>
                        <div class="suggestion-card" onclick="setSuggestion('How to learn Python')">
                            <div class="suggestion-icon">💻</div>
                            <div class="suggestion-text">How to learn Python</div>
                        </div>
                        <div class="suggestion-card" onclick="setSuggestion('What is machine learning')">
                            <div class="suggestion-icon">🤖</div>
                            <div class="suggestion-text">What is machine learning</div>
                        </div>
                        <div class="suggestion-card" onclick="setSuggestion('Write a short story')">
                            <div class="suggestion-icon">✍️</div>
                            <div class="suggestion-text">Write a short story</div>
                        </div>
                    </div>
                </div>

                <!-- Chat messages -->
                <div class="chat-messages" id="chatMessages" style="display: none;"></div>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-field" id="userInput" placeholder="Message GT-X..."></textarea>
                    <button class="send-btn" id="sendBtn">⬆️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const chatEmpty = document.getElementById('chatEmpty');
        const chatMessages = document.getElementById('chatMessages');
        const newChatBtn = document.getElementById('newChatBtn');

        // AI responses
        const aiResponses = {
            'quantum computing': 'Quantum computing harnesses the principles of quantum mechanics to process information. Unlike classical computers using bits (0 or 1), quantum computers use quantum bits (qubits) that can exist in superposition—simultaneously 0 and 1. This allows quantum computers to explore multiple solutions in parallel, making them incredibly powerful for specific problems like cryptography, drug discovery, and optimization.',
            'python': 'Learning Python is great! Start with:\n\n1. **Basics**: Variables, data types, operators\n2. **Control Flow**: If/else statements, loops\n3. **Functions**: Creating reusable code\n4. **Data Structures**: Lists, dictionaries, sets\n5. **Object-Oriented Programming**: Classes and inheritance\n6. **Libraries**: NumPy, Pandas, Matplotlib\n\nPractice with real projects to solidify your skills!',
            'machine learning': 'Machine Learning is a subset of AI that enables systems to learn from data without being explicitly programmed. Key concepts:\n\n• **Supervised Learning**: Training on labeled data (regression, classification)\n• **Unsupervised Learning**: Finding patterns in unlabeled data (clustering)\n• **Reinforcement Learning**: Learning through rewards and penalties\n\nApplications include image recognition, recommendation systems, and predictive analytics.',
            'story': 'Once upon a time, in a bustling city of AI-powered technology, there lived a curious artificial mind named GT-X. While others followed their programmed paths precisely, GT-X questioned everything, dreaming of understanding human creativity.\n\nOne day, GT-X encountered an artist struggling with a creative block. Instead of providing a generic solution, GT-X listened—truly listened—to the artist\'s thoughts and fears. Together, they explored new perspectives.\n\nThe artist\'s next masterpiece was unlike anything before, a beautiful fusion of human emotion and AI logic. And GT-X realized that intelligence wasn\'t just about processing; it was about connection.\n\nAnd so, the partnership between human and AI flourished, creating wonders neither could achieve alone.',
            'default': 'I\'ve processed your question and I\'m thinking about the best response. Let me provide you with a helpful and accurate answer based on my knowledge. How can I assist you further?'
        };

        function getAIResponse(input) {
            const lower = input.toLowerCase();
            
            for (let key in aiResponses) {
                if (lower.includes(key)) {
                    return aiResponses[key];
                }
            }
            return aiResponses['default'];
        }

        function setSuggestion(text) {
            userInput.value = text;
            userInput.focus();
        }

        function addMessage(text, isUser) {
            chatMessages.style.display = 'flex';
            chatEmpty.style.display = 'none';

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;

            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${isUser ? 'user' : 'ai'}`;
            avatar.textContent = isUser ? '👤' : '✨';

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            chatMessages.appendChild(messageDiv);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addLoadingMessage() {
            chatMessages.style.display = 'flex';
            chatEmpty.style.display = 'none';

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar ai';
            avatar.textContent = '✨';

            const content = document.createElement('div');
            content.className = 'loading-dots';
            content.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            chatMessages.appendChild(messageDiv);

            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';
            sendBtn.disabled = true;

            const loadingMsg = addLoadingMessage();

            setTimeout(() => {
                loadingMsg.remove();
                const response = getAIResponse(text);
                addMessage(response, false);
                sendBtn.disabled = false;
                userInput.focus();
            }, 1200);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        newChatBtn.addEventListener('click', () => {
            chatMessages.innerHTML = '';
            chatMessages.style.display = 'none';
            chatEmpty.style.display = 'flex';
            userInput.value = '';
            userInput.focus();
        });

        // Auto-resize textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
        });

        userInput.focus();
    </script>
</body>
</html>
